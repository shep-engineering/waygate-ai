site_name: Waygate AI
site_description: A guarded gateway between your application and AI providers.
site_url: https://shep-engineering.github.io/waygate-ai/
repo_name: shep-engineering/waygate-ai
repo_url: https://github.com/shep-engineering/waygate-ai
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/waygate-ai-mark.svg
  favicon: assets/waygate-ai-mark.svg
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  planning/

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - Trust Model: trust-model.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Integration Guide: INTEGRATION_GUIDE.md
  - Release Workflow: RELEASE_WORKFLOW.md
  - Decisions:
      - Unified Client: decisions/ADR-001-unified-llm-client.md
      - Prompt Guard: decisions/ADR-002-prompt-injection-guard.md
      - Backend Priority: decisions/ADR-003-backend-priority.md
  - Release Readiness: release-readiness.md
