schema_version: "USF v1.0"
name: integrate-agent-api
description: Integrate the agent-api LLM client into a Python agent or application.
risk_tier: L1
permissions:
  files:
    read:
      - pyproject.toml
      - requirements*.txt
      - "*.py"
    write:
      - .env.example
      - "*.py"
    deny_write:
      - AGENTS.md
      - security/**
  network:
    deny: "*"
