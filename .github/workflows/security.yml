name: Security Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Dependency vulnerability scan (fail-closed) ──────────────
  dep-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade "pip>=26.1" "setuptools>=78.1.1" pip-audit
      - name: Audit core + all extras
        run: |
          python -m pip install -e ".[all,dev]"
          pip-audit

  # ─── Secret scanning (fail-closed) ────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose

  # ─── Injection test suite (fail-closed) ───────────────────────
  injection-tests:
    name: Injection Tests (all 10 classes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: python -m pip install -e ".[dev]"
      - name: Run injection test suite
        run: pytest tests/unit/test_security.py -v --tb=short --no-cov

  # ─── Trivy dependency vulnerability scan (fail-closed) ───────────────
  trivy-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[all,dev]"
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─── SBOM generation (CycloneDX) ─────────────────────────────────────
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install cyclonedx-bom
        run: python -m pip install cyclonedx-bom
      - name: Install package
        run: python -m pip install -e ".[all]"
      - name: Generate SBOM
        run: cyclonedx-py environment --of JSON -o security/sbom/sbom-$(date +%Y%m%d).json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: security/sbom/
          retention-days: 90

  # ─── Full unit test suite ──────────────────────────────────────
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: python -m pip install -e ".[all,dev]"
      - name: Run tests
        run: pytest --tb=short -q
